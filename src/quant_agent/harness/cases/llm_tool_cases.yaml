- name: get_strategy_recommendation_valid
  tool: get_strategy_recommendation
  arguments:
    market_state: ranging
  gate:
    expected_keys:
      - recommended_strategy
      - reason

- name: get_strategy_recommendation_invalid_enum
  tool: get_strategy_recommendation
  arguments:
    market_state: invalid_state
  gate:
    expect_error: true

- name: calculate_position_size_kelly
  tool: calculate_position_size
  arguments:
    method: kelly
    win_rate: 0.55
    avg_win: 0.02
    avg_loss: 0.01
  gate:
    expected_keys:
      - method
      - position_size

- name: calculate_position_size_invalid_method
  tool: calculate_position_size
  arguments:
    method: unknown_method
  gate:
    expect_error: true
