name: CI

on:
  push:
  pull_request:
  schedule:
    # 每周一 06:00 UTC 跑 Live capability 评测（需配置 DEEPSEEK_API_KEY secret）
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Run unit tests
        run: python -m pytest tests/ -v -m "not integration" --ignore=tests/test_runtime_integration.py

      - name: Run offline agent regression eval
        run: python scripts/run_eval.py --evalset evalsets/regression_v1.yaml --output reports/eval_regression_v1.json

      - name: Upload offline eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-regression-v1
          path: |
            reports/eval_regression_v1.json
            reports/eval_regression_v1.md

      - name: Run quality harness gate
        run: python scripts/run_harness.py --gate --report reports/harness_report.json

  eval-live:
    runs-on: ubuntu-latest
    # push/PR/定时/手动 均可触发；无 API Key 时跳过（不失败）
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Live capability eval (DeepSeek)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "DEEPSEEK_API_KEY not set — skipping live capability eval"
            exit 0
          fi
          python scripts/run_eval.py --live --judge --output reports/eval_capability_v1.json

      - name: Upload live eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-capability-v1
          path: |
            reports/eval_capability_v1.json
            reports/eval_capability_v1.md
          if-no-files-found: ignore
